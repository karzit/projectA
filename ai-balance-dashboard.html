<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>AI 밸런스 대시보드</title>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1b1b22; color: #eee; margin: 0; padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  h2 { font-size: 15px; margin: 28px 0 8px; color: #9ad; }
  #status { font-size: 13px; color: #888; margin-bottom: 16px; transition: color 0.3s ease; }
  #status.live::before { content: '● '; color: #4caf50; }
  #status.done::before { content: '■ '; color: #ff9800; }
  #status.wait::before { content: '○ '; color: #666; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 4px 10px; text-align: left; border-bottom: 1px solid #333; transition: background-color 0.4s ease; }
  th { color: #9ad; font-weight: 600; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; transition: color 0.3s ease; }
  .bar-cell { position: relative; min-width: 140px; }
  .bar-track { position: relative; height: 14px; background: #2a2a33; border-radius: 3px; overflow: hidden; }
  .bar-fill { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg,#4caf50,#8bc34a);
              width: 0%; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .bar-label { font-size: 11px; color: #ccc; margin-top: 2px; transition: color 0.3s ease; }
  .matrix { border-collapse: collapse; }
  .matrix th, .matrix td { text-align: center; padding: 6px 12px; border: 1px solid #333; transition: background-color 0.5s ease; }
  .matrix td.diag { color: #555; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  tr.flash td { background-color: #2f3a2f; }
  #download-ai-btn { font: inherit; font-size: 12px; background: #2a2a33; color: #9ad; border: 1px solid #444;
                      border-radius: 4px; padding: 5px 12px; cursor: pointer; margin-bottom: 16px; }
  #download-ai-btn:hover:not(:disabled) { background: #33333e; }
  #download-ai-btn:disabled { opacity: 0.4; cursor: default; }
  #power-curve { background: #202028; border-radius: 6px; padding: 12px; }
  #power-curve > svg { width: 100%; height: 390px; display: block; }
  #power-curve .curve { fill: none; stroke-width: 2; }
  #power-curve .curve-dot { transition: cx 0.3s ease, cy 0.3s ease; }
  #power-curve .axis-line { stroke: #3a3a45; stroke-width: 1; }
  #power-curve .win-turn-line { stroke-width: 1.5; opacity: 0.85;
                                 transition: x1 0.4s ease, x2 0.4s ease; }
  #power-curve .win-turn-mode5-line { stroke-width: 1.5; stroke-dasharray: 4,3; opacity: 0.85;
                                       transition: x1 0.4s ease, x2 0.4s ease; }
  #power-curve .power-mode5-curve { fill: none; stroke-width: 1.5; stroke-dasharray: 4,3; opacity: 0.7; }
  #power-curve .power-mode5-dot { transition: cx 0.3s ease, cy 0.3s ease; }
  #power-curve .axis-label { fill: #888; font-size: 10px; }
  #power-curve .legend { display: flex; flex-wrap: wrap; gap: 16px; font-size: 12px; margin-top: 6px; }
  #power-curve .series-legend { color: #aaa; }
  #power-curve .legend-item { display: flex; align-items: center; gap: 6px; cursor: pointer;
                               user-select: none; transition: opacity 0.2s ease; }
  #power-curve .legend-item.legend-off { opacity: 0.35; }
  #power-curve .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  #power-curve .legend-icon { flex-shrink: 0; color: #aaa; }
  #power-curve svg [data-deck].deck-hidden { display: none; }
</style>
</head>
<body>
<h1>AI 밸런스 시뮬레이션 대시보드</h1>
<div id="status" class="wait">데이터 대기 중… (npm run test:balance:live 를 실행하세요)</div>
<button id="download-ai-btn" disabled>AI용 통계 다운로드 (.json)</button>

<div class="grid">
  <div>
    <h2>덱 매치업 승률</h2>
    <table id="matchup-table">
      <thead><tr><th>매치업</th><th>표본</th><th>A / B 승</th><th class="bar-cell">승률</th><th class="num">안전판</th><th class="num">평균턴</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div>
    <h2>덱 상성 매트릭스 (행 = A, 열 = B, 값 = A 승률%)</h2>
    <table class="matrix" id="matrix-table"></table>
  </div>
</div>

<h2>덱별 이야기 전개</h2>
<table id="story-table">
  <thead><tr><th>덱</th><th class="num">게임 수</th><th>평균 진행도</th><th class="bar-cell">완주율</th><th class="num">완주 시 평균턴</th></tr></thead>
  <tbody></tbody>
</table>

<h2>덱별 파워커브 (턴별 평균 총 전장 힘)</h2>
<div id="power-curve"></div>
<table id="win-turn-table">
  <thead><tr><th>덱</th><th class="num">승률</th><th class="num">평균 승리 턴</th><th class="num">최빈5 평균</th><th class="num">최소~최대 승리 턴</th></tr></thead>
  <tbody></tbody>
</table>

<h2>카드별 승률 (해당 카드를 플레이한 게임 기준)</h2>
<table id="card-table">
  <thead><tr><th>카드</th><th class="num">등장 게임</th><th class="num">평균 등장 턴</th><th class="num">평균 생존 턴</th><th class="bar-cell">승률</th></tr></thead>
  <tbody></tbody>
</table>

<script>
const STATS_URL = '/stats/ai-balance-stats.json';
const statusEl = document.getElementById('status');

function pct(n, d) { return d > 0 ? (100 * n / d) : 0; }
function fmt1(n) { return n.toFixed(1); }

// 표본 표준편차(n-1 분모) — 표본이 1개 이하면 null(표시 안 함).
function stddev(sum, sqSum, n) {
  if (!(n > 1)) return null;
  const mean = sum / n;
  const variance = (sqSum - n * mean * mean) / (n - 1);
  return Math.sqrt(Math.max(0, variance));
}
function fmtSd(sd, digits) {
  return sd === null ? '' : `±${sd.toFixed(digits ?? 1)}`;
}

// "최빈값 5개의 평균" — 승리 턴 분포에서 가장 빈도 높은 턴 값 최대 5개를 뽑아
// 그 턴 값 자체를 평균한다(tests/ai-balance.test.ts의 top5ModeAvgTurn와 동일 로직).
function top5ModeAvgTurn(histogram) {
  const entries = Object.entries(histogram ?? {}).map(([turn, count]) => ({ turn: Number(turn), count }));
  if (entries.length === 0) return null;
  entries.sort((a, b) => b.count - a.count || a.turn - b.turn);
  const top = entries.slice(0, 5);
  return top.reduce((sum, e) => sum + e.turn, 0) / top.length;
}

// 폴링마다 innerHTML을 통째로 갈아엎으면 DOM 노드가 매번 재생성되어 CSS
// transition이 적용될 시간(이전 노드 → 새 노드)이 없다. row 엘리먼트를 key로
// 재사용하고 텍스트/width만 갱신해야 바 그래프가 부드럽게 늘어난다.
function syncRows(tbody, items, keyFn, createFn, updateFn) {
  const existing = new Map();
  for (const tr of tbody.children) existing.set(tr.dataset.key, tr);
  let prev = null;
  for (const item of items) {
    const key = keyFn(item);
    let tr = existing.get(key);
    if (!tr) {
      tr = createFn(item);
      tr.dataset.key = key;
    } else {
      existing.delete(key);
    }
    updateFn(tr, item);
    if (prev) prev.after(tr); else tbody.prepend(tr);
    prev = tr;
  }
  for (const leftover of existing.values()) leftover.remove();
}

function barCell(pctLeft, label) {
  return `<div class="bar-track"><div class="bar-fill" style="width:${pctLeft.toFixed(1)}%"></div></div>` +
         `<div class="bar-label">${label}</div>`;
}

const DECK_COLORS = { heroic: '#ff9800', journey: '#4caf50', cult: '#e91e63' };

// 범례의 체크박스로 덱을 각자 독립적으로 켜고 끈다 — 여러 덱을 동시에 체크해
// 그래프를 비교할 수 있다(예: 2개만 켜서 비교). 기본은 전부 체크(표시).
// 상태는 폴링/재렌더와 무관하게 유지된다.
const hiddenDecks = new Set();
function toggleDeckVisibility(deckId) {
  if (hiddenDecks.has(deckId)) hiddenDecks.delete(deckId); else hiddenDecks.add(deckId);
  applyDeckVisibility();
}

// 데이터 종류(평균 파워/최빈5개 평균 파워/평균 승리 턴/최빈5개 평균 승리 턴)도
// 덱과 별개로 각자 켜고 끌 수 있다 — 예: "평균"만 다 끄고 "최빈5개"만 비교.
const SERIES_DEFS = [
  { key: 'avgPower', label: '평균 파워', classes: ['curve', 'dot-group'], orientation: 'vertical', dashed: false },
  { key: 'mode5Power', label: '최빈5개 평균 파워', classes: ['power-mode5-curve', 'power-mode5-dot-group'], orientation: 'vertical', dashed: true },
  { key: 'avgWinTurn', label: '평균 승리 턴', classes: ['win-turn-line'], orientation: 'horizontal', dashed: false },
  { key: 'mode5WinTurn', label: '최빈5개 평균 승리 턴', classes: ['win-turn-mode5-line'], orientation: 'horizontal', dashed: true },
];
const SERIES_CLASS_TO_KEY = new Map(SERIES_DEFS.flatMap((s) => s.classes.map((c) => [c, s.key])));

// 범례 항목 앞에 붙는 작은 아이콘 — 세로/가로 방향과 실선/점선으로 시리즈를
// 한눈에 구분한다(범례 텍스트만으로는 어떤 게 어떤 선인지 바로 안 와닿아서).
function seriesLegendIcon(orientation, dashed) {
  const dashAttr = dashed ? ' stroke-dasharray="2.5,2.5"' : '';
  const line = orientation === 'vertical'
    ? `<line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.5"${dashAttr} />`
    : `<line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5"${dashAttr} />`;
  return `<svg class="legend-icon" viewBox="0 0 12 12" width="10" height="10">${line}</svg>`;
}
const hiddenSeries = new Set();
function toggleSeriesVisibility(seriesKey) {
  if (hiddenSeries.has(seriesKey)) hiddenSeries.delete(seriesKey); else hiddenSeries.add(seriesKey);
  applyDeckVisibility();
}
function seriesKeyForElement(el) {
  for (const cls of el.classList) {
    const key = SERIES_CLASS_TO_KEY.get(cls);
    if (key) return key;
  }
  return null;
}

function applyDeckVisibility() {
  const container = document.getElementById('power-curve');
  if (!container) return;
  const svg = container.querySelector('svg');
  if (svg) {
    for (const el of svg.querySelectorAll('[data-deck]')) {
      const seriesKey = seriesKeyForElement(el);
      const hidden = hiddenDecks.has(el.dataset.deck) || (seriesKey !== null && hiddenSeries.has(seriesKey));
      el.classList.toggle('deck-hidden', hidden);
    }
  }
  for (const item of container.querySelectorAll('.legend-item[data-deck]')) {
    item.classList.toggle('legend-off', hiddenDecks.has(item.dataset.deck));
  }
  for (const item of container.querySelectorAll('.legend-item[data-series]')) {
    item.classList.toggle('legend-off', hiddenSeries.has(item.dataset.series));
  }
}
const POWER_CURVE_W_MIN = 480, POWER_CURVE_H = 330, POWER_CURVE_PAD = 30;

// SVG를 매번 통째로 새로 만들지 않고, 좌표(cx/cy/points)만 갱신해서 CSS
// transition(.curve-dot)이 걸리도록 한다 — 다른 섹션과 동일한 "부드럽게 변하는" 원칙.
function renderPowerCurve(powerCurve, winTurns) {
  const container = document.getElementById('power-curve');
  const deckIds = Object.keys(powerCurve).filter((id) => powerCurve[id].length > 0);
  if (deckIds.length === 0) {
    container.innerHTML = '<div class="bar-label">데이터 대기 중…</div>';
    return;
  }

  const winTurnEntries = deckIds
    .map((id) => {
      const w = winTurns?.[id];
      const avgTurn = w?.wins > 0 ? w.turnSumOnWin / w.wins : null;
      const sdTurn = w?.wins > 0 ? stddev(w.turnSumOnWin, w.turnSqSumOnWin ?? 0, w.wins) : null;
      const mode5Turn = w?.wins > 0 ? top5ModeAvgTurn(w.turnHistogram) : null;
      return { id, avgTurn, sdTurn, mode5Turn, minTurn: w?.minTurnOnWin ?? null, maxTurn: w?.maxTurnOnWin ?? null };
    })
    .filter((w) => w.avgTurn !== null);
  const maxTurn = Math.ceil(Math.max(
    1,
    ...deckIds.flatMap((id) => powerCurve[id].map((p) => p.turn)),
    ...winTurnEntries.map((w) => w.avgTurn),
    ...winTurnEntries.map((w) => w.maxTurn ?? 0),
    ...winTurnEntries.map((w) => w.mode5Turn ?? 0),
  ));
  const maxPower = Math.max(1, ...deckIds.flatMap((id) => powerCurve[id].map((p) => p.avgPower)));

  if (!container.dataset.built) {
    container.innerHTML =
      `<svg></svg><div class="legend"></div>` +
      `<div class="legend series-legend">` +
      SERIES_DEFS.map((s) =>
        `<div class="legend-item" data-series="${s.key}" title="클릭하면 모든 덱에서 이 데이터 종류를 숨긴다">` +
        `${seriesLegendIcon(s.orientation, s.dashed)}${s.label}</div>`,
      ).join('') +
      `</div>`;
    container.dataset.built = '1';
    for (const item of container.querySelectorAll('.series-legend .legend-item[data-series]')) {
      item.addEventListener('click', () => toggleSeriesVisibility(item.dataset.series));
    }
  }
  const svg = container.querySelector('svg');
  const legend = container.querySelector('.legend:not(.series-legend)');

  // viewBox 너비를 컨테이너의 실제 픽셀 너비에 맞춰 잡는다(1:1 스케일 유지) —
  // CSS width:100%로 SVG 자체는 이미 화면 크기에 맞춰 늘어나 있으니, viewBox도
  // 그 실측 너비를 그대로 쓰면 늘어난 만큼 그래프 내용도 실제로 넓어진다.
  // preserveAspectRatio="none"으로 통째로 늘리는 방식과 달리 점(circle)이나
  // 글자가 타원형으로 찌그러지지 않는다(x/y 배율이 항상 1:1).
  const powerCurveW = Math.max(POWER_CURVE_W_MIN, Math.round(svg.clientWidth || POWER_CURVE_W_MIN));
  const x = (turn) => POWER_CURVE_PAD + (turn / maxTurn) * (powerCurveW - POWER_CURVE_PAD * 2);
  const y = (power) => POWER_CURVE_H - POWER_CURVE_PAD - (power / maxPower) * (POWER_CURVE_H - POWER_CURVE_PAD * 2);

  // 컨테이너 너비가 바뀌면(창 리사이즈 등) viewBox와 축(고정 요소)을 다시 그린다.
  if (svg.dataset.builtWidth !== String(powerCurveW)) {
    svg.setAttribute('viewBox', `0 0 ${powerCurveW} ${POWER_CURVE_H}`);
    svg.dataset.builtWidth = String(powerCurveW);
    svg.innerHTML =
      `<line class="axis-line" x1="${POWER_CURVE_PAD}" y1="${POWER_CURVE_H - POWER_CURVE_PAD}" x2="${powerCurveW - POWER_CURVE_PAD}" y2="${POWER_CURVE_H - POWER_CURVE_PAD}" />` +
      `<line class="axis-line" x1="${POWER_CURVE_PAD}" y1="${POWER_CURVE_PAD}" x2="${POWER_CURVE_PAD}" y2="${POWER_CURVE_H - POWER_CURVE_PAD}" />` +
      `<text class="axis-label" x="${POWER_CURVE_PAD}" y="${POWER_CURVE_H - 8}">턴 1</text>` +
      `<text class="axis-label" x="${powerCurveW - POWER_CURVE_PAD}" y="${POWER_CURVE_H - 8}" text-anchor="end">턴 ${maxTurn}</text>` +
      `<text class="axis-label" x="4" y="${POWER_CURVE_PAD}">힘 ${maxPower.toFixed(0)}</text>`;
  }

  for (const deckId of deckIds) {
    const color = DECK_COLORS[deckId] ?? '#9ad';
    const points = powerCurve[deckId];
    const pointsAttr = points.map((p) => `${x(p.turn).toFixed(1)},${y(p.avgPower).toFixed(1)}`).join(' ');

    let path = svg.querySelector(`.curve[data-deck="${deckId}"]`);
    if (!path) {
      path = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      path.setAttribute('class', 'curve');
      path.dataset.deck = deckId;
      path.setAttribute('stroke', color);
      svg.appendChild(path);
    }
    path.setAttribute('points', pointsAttr);

    // 점 엘리먼트도 turn을 key로 재사용 — cx/cy 변화가 transition으로 부드럽게 이동
    const dotGroupSel = `.dot-group[data-deck="${deckId}"]`;
    let dotGroup = svg.querySelector(dotGroupSel);
    if (!dotGroup) {
      dotGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      dotGroup.setAttribute('class', 'dot-group');
      dotGroup.dataset.deck = deckId;
      svg.appendChild(dotGroup);
    }
    const existingDots = new Map();
    for (const c of dotGroup.children) existingDots.set(c.dataset.turn, c);
    for (const p of points) {
      const key = String(p.turn);
      let dot = existingDots.get(key);
      if (!dot) {
        dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('class', 'curve-dot');
        dot.setAttribute('r', 2.5);
        dot.setAttribute('fill', color);
        dot.dataset.turn = key;
        dotGroup.appendChild(dot);
      } else {
        existingDots.delete(key);
      }
      dot.setAttribute('cx', x(p.turn).toFixed(1));
      dot.setAttribute('cy', y(p.avgPower).toFixed(1));
      const title = dot.querySelector('title') ?? dot.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title'));
      title.textContent = `턴 ${p.turn}: 평균 힘 ${p.avgPower.toFixed(1)} (표본 ${p.samples})`;
    }
    for (const leftover of existingDots.values()) leftover.remove();

    // 최빈값 5개 평균 힘 곡선 — 평균 곡선(.curve)과 같은 모양으로, 턴마다 서버가
    // 계산해 보내주는 mode5Power(그 턴 힘 값 분포에서 최빈값 5개의 평균)를 점선으로
    // 그린다. 실선(평균)과 파악하려는 수치는 비슷하되 이상치에 덜 끌려간다.
    const modePoints = points.filter((p) => p.mode5Power !== null && p.mode5Power !== undefined);
    const modePointsAttr = modePoints.map((p) => `${x(p.turn).toFixed(1)},${y(p.mode5Power).toFixed(1)}`).join(' ');

    let modePath = svg.querySelector(`.power-mode5-curve[data-deck="${deckId}"]`);
    if (!modePath) {
      modePath = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      modePath.setAttribute('class', 'power-mode5-curve');
      modePath.dataset.deck = deckId;
      modePath.setAttribute('stroke', color);
      svg.appendChild(modePath);
    }
    modePath.setAttribute('points', modePointsAttr);

    const modeDotGroupSel = `.power-mode5-dot-group[data-deck="${deckId}"]`;
    let modeDotGroup = svg.querySelector(modeDotGroupSel);
    if (!modeDotGroup) {
      modeDotGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      modeDotGroup.setAttribute('class', 'power-mode5-dot-group');
      modeDotGroup.dataset.deck = deckId;
      svg.appendChild(modeDotGroup);
    }
    const existingModeDots = new Map();
    for (const c of modeDotGroup.children) existingModeDots.set(c.dataset.turn, c);
    for (const p of modePoints) {
      const key = String(p.turn);
      let dot = existingModeDots.get(key);
      if (!dot) {
        dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('class', 'power-mode5-dot');
        dot.setAttribute('r', 2);
        dot.setAttribute('fill', color);
        dot.dataset.turn = key;
        modeDotGroup.appendChild(dot);
      } else {
        existingModeDots.delete(key);
      }
      dot.setAttribute('cx', x(p.turn).toFixed(1));
      dot.setAttribute('cy', y(p.mode5Power).toFixed(1));
      const title = dot.querySelector('title') ?? dot.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title'));
      title.textContent = `턴 ${p.turn}: 최빈값 5개 평균 힘 ${p.mode5Power.toFixed(1)}`;
    }
    for (const leftover of existingModeDots.values()) leftover.remove();

    // 평균 승리 턴을 얇은 점선 수직선으로 표시 (기존 곡선/점은 그대로 유지)
    const winEntry = winTurnEntries.find((w) => w.id === deckId);

    let winLine = svg.querySelector(`.win-turn-line[data-deck="${deckId}"]`);
    if (winEntry) {
      if (!winLine) {
        winLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        winLine.setAttribute('class', 'win-turn-line');
        winLine.dataset.deck = deckId;
        winLine.setAttribute('stroke', color);
        winLine.setAttribute('y1', POWER_CURVE_PAD);
        winLine.setAttribute('y2', POWER_CURVE_H - POWER_CURVE_PAD);
        svg.appendChild(winLine);
        const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
        winLine.appendChild(title);
      }
      const lineX = x(winEntry.avgTurn).toFixed(1);
      winLine.setAttribute('x1', lineX);
      winLine.setAttribute('x2', lineX);
      winLine.querySelector('title').textContent = `${deckId} 평균 승리 턴: ${winEntry.avgTurn.toFixed(1)}`;
    } else if (winLine) {
      winLine.remove();
    }

    // 최빈값 5개의 평균 승리 턴을 촘촘한 점선 수직선으로 표시(평균선과 구분되게).
    let mode5Line = svg.querySelector(`.win-turn-mode5-line[data-deck="${deckId}"]`);
    if (winEntry && winEntry.mode5Turn !== null) {
      if (!mode5Line) {
        mode5Line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        mode5Line.setAttribute('class', 'win-turn-mode5-line');
        mode5Line.dataset.deck = deckId;
        mode5Line.setAttribute('stroke', color);
        mode5Line.setAttribute('y1', POWER_CURVE_PAD);
        mode5Line.setAttribute('y2', POWER_CURVE_H - POWER_CURVE_PAD);
        svg.appendChild(mode5Line);
        const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
        mode5Line.appendChild(title);
      }
      const lineX = x(winEntry.mode5Turn).toFixed(1);
      mode5Line.setAttribute('x1', lineX);
      mode5Line.setAttribute('x2', lineX);
      mode5Line.querySelector('title').textContent = `${deckId} 최빈값 5개 평균 승리 턴: ${winEntry.mode5Turn.toFixed(1)}`;
    } else if (mode5Line) {
      mode5Line.remove();
    }

  }

  if (legend.children.length !== deckIds.length) {
    legend.innerHTML = deckIds
      .map((id) => `<div class="legend-item" data-deck="${id}" title="클릭하면 이 덱 그래프를 숨긴다 — 2개만 켜서 비교 가능">` +
        `<span class="legend-swatch" style="background:${DECK_COLORS[id] ?? '#9ad'}"></span>${id}</div>`)
      .join('');
    for (const item of legend.querySelectorAll('.legend-item[data-deck]')) {
      item.addEventListener('click', () => toggleDeckVisibility(item.dataset.deck));
    }
  }

  applyDeckVisibility();
}

function render(data) {
  statusEl.textContent = data.done
    ? `완료 — 매치업당 ${data.gamesPerMatchup}판, 갱신 ${new Date(data.updatedAt).toLocaleTimeString()}`
    : `진행 중… (Ctrl+C로 멈추기 전까지 계속 누적) 갱신 ${new Date(data.updatedAt).toLocaleTimeString()}`;
  statusEl.className = data.done ? 'done' : 'live';

  // 매치업 테이블
  syncRows(
    document.querySelector('#matchup-table tbody'),
    data.matchups,
    (m) => m.a + '|' + m.b,
    () => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td class="pair"></td><td class="num games"></td><td class="num wins"></td>' +
        '<td class="bar-cell fill"></td><td class="num stuck"></td><td class="num turns"></td>';
      return tr;
    },
    (tr, m) => {
      const total = m.aWins + m.bWins;
      const aPct = pct(m.aWins, total || 1);
      const avgTurns = m.gamesRun > 0 ? fmt1(m.turnSum / m.gamesRun) : '-';
      const sdTurns = m.gamesRun > 0 ? stddev(m.turnSum, m.turnSqSum ?? 0, m.gamesRun) : null;
      tr.querySelector('.pair').textContent = `${m.a} vs ${m.b}`;
      tr.querySelector('.games').textContent = m.gamesRun;
      tr.querySelector('.wins').textContent = `${m.aWins} / ${m.bWins}`;
      tr.querySelector('.fill').innerHTML = barCell(aPct, `A ${aPct.toFixed(0)}% · B ${(100 - aPct).toFixed(0)}%`);
      tr.querySelector('.stuck').textContent = m.stuck;
      tr.querySelector('.turns').textContent = `${avgTurns} ${fmtSd(sdTurns)}`;
    },
  );

  // 상성 매트릭스 — 셀도 재사용, 배경색만 트랜지션
  const deckIds = [...new Set(data.matchups.flatMap(m => [m.a, m.b]))];
  const matrixTable = document.getElementById('matrix-table');
  const byPair = {};
  for (const m of data.matchups) byPair[m.a + '|' + m.b] = m;
  if (matrixTable.dataset.built !== deckIds.join(',')) {
    let html = '<tr><th></th>' + deckIds.map(d => `<th>${d}</th>`).join('') + '</tr>';
    for (const a of deckIds) {
      html += `<tr><th>${a}</th>`;
      for (const b of deckIds) {
        html += a === b ? '<td class="diag">—</td>' : `<td data-a="${a}" data-b="${b}">-</td>`;
      }
      html += '</tr>';
    }
    matrixTable.innerHTML = html;
    matrixTable.dataset.built = deckIds.join(',');
  }
  for (const cell of matrixTable.querySelectorAll('td[data-a]')) {
    const m = byPair[cell.dataset.a + '|' + cell.dataset.b];
    if (!m || m.aWins + m.bWins === 0) { cell.textContent = '-'; cell.style.background = ''; continue; }
    const aPct = pct(m.aWins, m.aWins + m.bWins);
    const hue = aPct >= 50 ? 120 : 0;
    const alpha = Math.abs(aPct - 50) / 50;
    cell.textContent = aPct.toFixed(0) + '%';
    cell.style.background = `hsla(${hue},60%,40%,${alpha.toFixed(2)})`;
  }

  // 이야기 전개
  syncRows(
    document.querySelector('#story-table tbody'),
    Object.entries(data.story).filter(([, s]) => s.games > 0),
    ([deckId]) => deckId,
    () => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td class="deck"></td><td class="num games"></td><td class="stage"></td>' +
        '<td class="bar-cell fill"></td><td class="num turns"></td>';
      return tr;
    },
    (tr, [deckId, s]) => {
      const avgStage = (s.stageSum / s.games).toFixed(2);
      const sdStage = stddev(s.stageSum, s.stageSqSum ?? 0, s.games);
      const completeRate = pct(s.complete, s.games);
      const avgTurnOnComplete = s.complete > 0 ? fmt1(s.turnSumOnComplete / s.complete) : '-';
      tr.querySelector('.deck').textContent = deckId;
      tr.querySelector('.games').textContent = s.games;
      tr.querySelector('.stage').textContent = `${avgStage} ${fmtSd(sdStage, 2)} / ${s.chainLen}`;
      tr.querySelector('.fill').innerHTML = barCell(completeRate, `${completeRate.toFixed(0)}% (${s.complete}/${s.games})`);
      tr.querySelector('.turns').textContent = avgTurnOnComplete;
    },
  );

  renderPowerCurve(data.powerCurve || {}, data.winTurns || {});

  // 파워커브 옆 요약: 이 덱이 이길 때 보통 몇 턴에 끝나는지(상대 무관 집계).
  syncRows(
    document.querySelector('#win-turn-table tbody'),
    Object.entries(data.winTurns || {}).filter(([, w]) => w.games > 0),
    ([deckId]) => deckId,
    () => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td class="deck"></td><td class="num winrate"></td><td class="num turns"></td>' +
        '<td class="num mode5"></td><td class="num turn-range"></td>';
      return tr;
    },
    (tr, [deckId, w]) => {
      const winRate = pct(w.wins, w.games);
      const avgTurnOnWin = w.wins > 0 ? fmt1(w.turnSumOnWin / w.wins) : '-';
      const sdTurnOnWin = w.wins > 0 ? stddev(w.turnSumOnWin, w.turnSqSumOnWin ?? 0, w.wins) : null;
      const top5Mode = w.wins > 0 ? top5ModeAvgTurn(w.turnHistogram) : null;
      const turnRange = w.wins > 0 ? `${w.minTurnOnWin}~${w.maxTurnOnWin}` : '-';
      tr.querySelector('.deck').textContent = deckId;
      tr.querySelector('.winrate').textContent = `${winRate.toFixed(0)}% (${w.wins}/${w.games})`;
      tr.querySelector('.turns').textContent = `${avgTurnOnWin} ${fmtSd(sdTurnOnWin)}`;
      tr.querySelector('.mode5').textContent = top5Mode === null ? '-' : fmt1(top5Mode);
      tr.querySelector('.turn-range').textContent = turnRange;
    },
  );

  // 카드별 승률
  const cardEntries = Object.entries(data.cards).sort((a, b) => b[1].games - a[1].games);
  syncRows(
    document.querySelector('#card-table tbody'),
    cardEntries,
    ([cardId]) => cardId,
    () => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td class="card"></td><td class="num games"></td><td class="num appear-turn"></td>' +
        '<td class="num survival"></td><td class="bar-cell fill"></td>';
      return tr;
    },
    (tr, [cardId, c]) => {
      const wr = pct(c.wins, c.games);
      const avgAppearTurn = c.games > 0 ? fmt1(c.turnSum / c.games) : '-';
      const avgSurvival = c.survivalCount > 0 ? fmt1(c.survivalSum / c.survivalCount) : '-';
      tr.querySelector('.card').textContent = cardId;
      tr.querySelector('.games').textContent = c.games;
      tr.querySelector('.appear-turn').textContent = avgAppearTurn;
      tr.querySelector('.survival').textContent = avgSurvival;
      tr.querySelector('.fill').innerHTML = barCell(wr, `${wr.toFixed(0)}% (${c.wins}/${c.games})`);
    },
  );
}

// 사람이 보는 화면(막대그래프·%)과 별개로, 원본 카운터에서 파생 지표를
// 직접 계산해 압축된 JSON을 만든다 — 라벨·주석 없이 LLM이 바로 집계값을
// 읽을 수 있는 형태(승률/완주율 등은 미리 나눗셈까지 끝낸 숫자로 제공).
function buildAiSummary(data) {
  return {
    updatedAt: data.updatedAt,
    done: data.done,
    gamesPerMatchup: data.gamesPerMatchup,
    matchups: data.matchups.map((m) => ({
      a: m.a,
      b: m.b,
      gamesRun: m.gamesRun,
      aWins: m.aWins,
      bWins: m.bWins,
      aWinRate: m.gamesRun > 0 ? +pct(m.aWins, m.aWins + m.bWins || 1).toFixed(1) : null,
      stuck: m.stuck,
      avgTurns: m.gamesRun > 0 ? +(m.turnSum / m.gamesRun).toFixed(2) : null,
      sdTurns: m.gamesRun > 0 ? stddev(m.turnSum, m.turnSqSum ?? 0, m.gamesRun) : null,
    })),
    story: Object.fromEntries(
      Object.entries(data.story).map(([deckId, s]) => [deckId, {
        games: s.games,
        chainLen: s.chainLen,
        avgStage: s.games > 0 ? +(s.stageSum / s.games).toFixed(3) : null,
        sdStage: s.games > 0 ? stddev(s.stageSum, s.stageSqSum ?? 0, s.games) : null,
        completeRate: s.games > 0 ? +pct(s.complete, s.games).toFixed(1) : null,
        completeCount: s.complete,
        avgTurnOnComplete: s.complete > 0 ? +(s.turnSumOnComplete / s.complete).toFixed(2) : null,
      }]),
    ),
    cards: Object.fromEntries(
      Object.entries(data.cards).map(([cardId, c]) => [cardId, {
        games: c.games,
        wins: c.wins,
        winRate: c.games > 0 ? +pct(c.wins, c.games).toFixed(1) : null,
        avgAppearTurn: c.games > 0 ? +(c.turnSum / c.games).toFixed(2) : null,
        avgSurvivalTurns: c.survivalCount > 0 ? +(c.survivalSum / c.survivalCount).toFixed(2) : null,
      }]),
    ),
    powerCurve: Object.fromEntries(
      Object.entries(data.powerCurve || {}).map(([deckId, points]) => [
        deckId,
        points.map((p) => ({
          turn: p.turn,
          avgPower: +p.avgPower.toFixed(2),
          mode5Power: p.mode5Power === null || p.mode5Power === undefined ? null : +p.mode5Power.toFixed(2),
          samples: p.samples,
        })),
      ]),
    ),
    winTurns: Object.fromEntries(
      Object.entries(data.winTurns || {}).map(([deckId, w]) => [deckId, {
        games: w.games,
        wins: w.wins,
        winRate: w.games > 0 ? +pct(w.wins, w.games).toFixed(1) : null,
        avgTurnOnWin: w.wins > 0 ? +(w.turnSumOnWin / w.wins).toFixed(2) : null,
        sdTurnOnWin: w.wins > 0 ? stddev(w.turnSumOnWin, w.turnSqSumOnWin ?? 0, w.wins) : null,
        mode5AvgTurnOnWin: w.wins > 0 ? top5ModeAvgTurn(w.turnHistogram) : null,
        minTurnOnWin: w.minTurnOnWin ?? null,
        maxTurnOnWin: w.maxTurnOnWin ?? null,
      }]),
    ),
  };
}

function downloadAiSummary() {
  if (!lastData) return;
  const summary = buildAiSummary(lastData);
  const blob = new Blob([JSON.stringify(summary)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ai-balance-stats-ai-${summary.updatedAt}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('download-ai-btn').addEventListener('click', downloadAiSummary);

let lastUpdatedAt = 0;
let lastData = null;
async function poll() {
  try {
    const res = await fetch(STATS_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    lastData = data;
    document.getElementById('download-ai-btn').disabled = false;
    if (data.updatedAt === lastUpdatedAt) return; // 변화 없으면 재렌더 생략(불필요한 트랜지션 재시작 방지)
    lastUpdatedAt = data.updatedAt;
    render(data);
  } catch (e) {
    // 서버가 아직 파일을 안 만들었으면 조용히 재시도
  }
}

poll();
setInterval(poll, 100);

// 창 크기가 바뀌면 파워커브 viewBox도 새 컨테이너 너비에 맞춰 다시 그린다
// (poll()은 데이터가 안 바뀌면 재렌더를 건너뛰므로 리사이즈만으론 안 갱신됨).
let resizeRaf = null;
window.addEventListener('resize', () => {
  if (resizeRaf !== null) return;
  resizeRaf = requestAnimationFrame(() => {
    resizeRaf = null;
    if (lastData) renderPowerCurve(lastData.powerCurve || {}, lastData.winTurns || {});
  });
});
</script>
</body>
</html>
